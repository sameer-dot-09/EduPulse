<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse | Student Performance Predictor</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* LEFT PANEL */
        .left-panel {
            width: 420px;
        }

        .container {
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* RIGHT PANEL */
        .right-panel {
            width: 420px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2, h3 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #2cb489;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1f8a6a;
        }

        .result {
            margin-top: 20px;
            padding: 12px;
            background: #ecf9f1;
            border-left: 5px solid #2ecc71;
            font-weight: bold;
            text-align: center;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="main-layout">

    <!-- LEFT SIDE: FORM + RESULT -->
    <div class="left-panel">
        <div class="container">
            <h2>EduPulse</h2>

            <form action="/predict" method="post">

                <label>G1 – First Period Grade</label>
                <input type="number" name="G1" min="0" max="20" required>

                <label>G2 – Second Period Grade</label>
                <input type="number" name="G2" min="0" max="20" required>

                <label>Study Time (1–4)</label>
                <input type="number" name="studytime" min="1" max="4" required>

                <label>Failures</label>
                <input type="number" name="failures" min="0" max="4" required>

                <label>Health (1–5)</label>
                <input type="number" name="health" min="1" max="5" required>

                <label>Free Time (1–5)</label>
                <input type="number" name="freetime" min="1" max="5" required>

                <label>Daily Alcohol Consumption (Dalc)</label>
                <input type="number" name="Dalc" min="1" max="5" required>

                <label>Weekend Alcohol Consumption (Walc)</label>
                <input type="number" name="Walc" min="1" max="5" required>

                <label>Family Support</label>
                <select name="famsup">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <label>School Support</label>
                <select name="schoolsup">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <label>Paid Classes</label>
                <select name="paid">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <label>Internet Access</label>
                <select name="internet">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <label>Extra Activities</label>
                <select name="activities">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <button type="submit">Predict Final Grade</button>
            </form>

            {% if prediction is not none %}
                <div class="result">
                    Predicted Final Grade (G3): {{ prediction }} <br>
                    Status: <strong>{{ category }}</strong>
                </div>
            {% endif %}

            <div class="footer">
                EduPulse • ML + Flask Project
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE: GRAPH -->
    {% if prediction is not none %}
    <div class="right-panel">
        <h3>G2 vs Predicted G3</h3>
        <canvas id="gradeChart" width="380" height="260"></canvas>
    </div>
    {% endif %}

</div>

{% if prediction is not none %}
<script>
    const ctx = document.getElementById('gradeChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['G2 (Second Period)', 'Predicted G3'],
            datasets: [{
                label: 'Grade Comparison',
                data: [{{ g2 }}, {{ prediction }}],
                backgroundColor: ['#3498db', '#2ecc71']
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 20
                }
            }
        }
    });
</script>
{% endif %}

</body>
</html>
